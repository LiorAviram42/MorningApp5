<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Morning" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#fdf6e3" />
    <meta name="color-scheme" content="light" />
    <link rel="manifest" href="/manifest_v6.json" />
    <link rel="apple-touch-icon" href="/Icons/Morning_App_Icon_V7.png" />
    <link rel="icon" type="image/png" href="/Icons/Morning_App_Icon_V7.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/Icons/Morning_App_Icon_V7.png"
    />
    <title>Morning</title>
    <style>
      /* Prevent pull-to-refresh and other unwanted mobile behaviors */
      html,
      body {
        overscroll-behavior-y: none;
        background-color: #fdf6e3;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        min-height: 100dvh;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      /* Remove the status bar gap on some browsers */
      #root {
        min-height: 100dvh;
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body class="bg-[#fdf6e3] m-0 p-0 overflow-x-hidden min-h-[100dvh] w-full">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
